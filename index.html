<!doctype html>
<html lang="en">
  <head>
    <!-- ===== BASIC META ===== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ===== FAVICON ===== -->
    <!-- Replace with your actual logo file -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ===== PRIMARY SEO ===== -->
    <title>Natural Tatva | Pure & Organic Jaggery Products</title>
    <meta
      name="description"
      content="Natural Tatva offers 100% pure, organic jaggery products made with traditional methods. Buy premium quality jaggery online — healthy, natural, and chemical-free."
    />
    <meta
      name="keywords"
      content="natural jaggery, organic jaggery, pure jaggery, buy jaggery online, healthy jaggery, Natural Tatva, chemical free jaggery, traditional jaggery"
    />
    <meta name="author" content="Natural Tatva" />
    <meta name="robots" content="index, follow" />

    <!-- ===== CANONICAL URL ===== -->
    <!-- Replace with your actual deployed domain -->
    <link rel="canonical" href="https://www.naturaltatva.com/" />

    <!-- ===== OPEN GRAPH (Facebook, WhatsApp, LinkedIn previews) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Natural Tatva" />
    <meta
      property="og:title"
      content="Natural Tatva | Pure & Organic Jaggery Products"
    />
    <meta
      property="og:description"
      content="Natural Tatva offers 100% pure, organic jaggery products made with traditional methods. Buy premium quality jaggery online — healthy, natural, and chemical-free."
    />
    <meta property="og:url" content="https://www.naturaltatva.com/" />
    <!-- Replace with your actual OG image (1200x630px recommended) -->
    <meta property="og:image" content="https://www.naturaltatva.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- ===== TWITTER CARD ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Natural Tatva | Pure & Organic Jaggery Products"
    />
    <meta
      name="twitter:description"
      content="Natural Tatva offers 100% pure, organic jaggery products made with traditional methods. Buy premium quality jaggery online."
    />
    <meta name="twitter:image" content="https://www.naturaltatva.com/og-image.jpg" />

    <!-- ===== MOBILE & BROWSER THEME ===== -->
    <!-- Brown/earthy tone matching jaggery brand — change to your brand color -->
    <meta name="theme-color" content="#7B4F2E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Natural Tatva" />

    <!-- ===== GOOGLE FONTS ===== -->
    <!-- Playfair Display for headings (elegant, premium feel) -->
    <!-- Lato for body text (clean, readable) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ===== STRUCTURED DATA (JSON-LD) for Google Rich Results ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Organization", "Store"],
        "name": "Natural Tatva",
        "url": "https://www.naturaltatva.com",
        "logo": "https://www.naturaltatva.com/logo.png",
        "description": "Natural Tatva offers 100% pure, organic jaggery products made with traditional methods.",
        "sameAs": [
          "https://www.instagram.com/naturaltatva",
          "https://www.facebook.com/naturaltatva"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["English", "Hindi"]
        }
      }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
